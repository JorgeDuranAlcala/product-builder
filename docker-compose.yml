services:
  postgres:
    image: postgres:16-alpine
    container_name: products-config-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: products
      POSTGRES_PASSWORD: products
      POSTGRES_DB: products_config
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U products -d products_config"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
